
version: '3.8'

services:
  eigensdk: &eigensdk
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eigensdk
    working_dir: /app
    environment:
      - VIRTUAL_ENV=/app/.venv
    dns:
      - 8.8.8.8
    
    command: >
      /bin/bash -c "set -ex;
        nohup anvil > anvil.log 2>&1 & ANVIL_PID=$!;
        sleep 3;
        cd /app/eigenlayer-contracts;
        sleep 5;
        forge script script/deploy/local/deploy_from_scratch.slashing.s.sol --fork-url http://127.0.0.1:8545 --broadcast --skip-simulation --sig 'run(string memory)' 'local/deploy_from_scratch.slashing.anvil.config.json' --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80;
        wait $ANVIL_PID"
    ports:
      - "8545:8545"
    restart: unless-stopped  
    network_mode: "host"

